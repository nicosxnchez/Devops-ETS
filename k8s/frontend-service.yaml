apiVersion: v1
kind: Service
metadata:
  name: despachos-frontend
  namespace: despachos
  annotations:
    # Indicamos que el LB lo maneja el AWS Load Balancer Controller
    # ervice.beta.kubernetes.io/aws-load-balancer-type: "external"
    # Forzamos que sea pǧblico y (no interno)
    # service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: despachos-frontend
  ports:
    - port: 80
      targetPort: 80
