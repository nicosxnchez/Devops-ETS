apiVersion: apps/v1
kind: Deployment
metadata:
  name: despachos-db
  namespace: despachos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: despachos-db
  template:
    metadata:
      labels:
        app: despachos-db
    spec:
      containers:
        - name: mysql
          image: {{ECR_URL}}/despachos-db:eks-v1
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
      volumes:
        - name: data
          emptyDir: {}
